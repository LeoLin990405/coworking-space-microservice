apiVersion: v1
kind: ConfigMap
metadata:
  name: coworking-config
data:
  DB_NAME: postgres
  DB_USERNAME: postgres
  DB_HOST: coworking-postgresql.default.svc.cluster.local
  DB_PORT: "5432"
---
apiVersion: v1
kind: Secret
metadata:
  name: coworking-secret
type: Opaque
stringData:
  DB_PASSWORD: REPLACE_WITH_POSTGRES_PASSWORD
